<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizForge — Interactive Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c10;
      --surface: #0f1620;
      --border: #1e2d40;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --accent3: #a259ff;
      --ok: #00e5a0;
      --text: #e8f0fe;
      --muted: #607080;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      width: 100%; max-width: 720px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: .1em;
    }
    .logo span { color: var(--accent2); }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      position: relative;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
    }

    /* ── HOME SCREEN ── */
    .home-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: .8rem;
    }
    .home-title span { color: var(--accent); }
    .home-sub { color: var(--muted); font-size: .95rem; line-height: 1.7; margin-bottom: 2rem; }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .cat-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 1.2rem;
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .cat-btn.selected {
      border-color: var(--accent);
      background: rgba(0,229,255,.06);
    }
    .cat-btn:hover { border-color: var(--accent); }
    .cat-icon { font-size: 1.6rem; margin-bottom: .5rem; }
    .cat-name { font-weight: 700; font-size: .95rem; }
    .cat-count { font-family: var(--mono); font-size: .7rem; color: var(--muted); }

    .difficulty-row {
      display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 2rem;
    }
    .diff-btn {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .5rem 1.2rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: .2s;
    }
    .diff-btn.selected { border-color: var(--accent); color: var(--accent); }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }

    .label {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .75rem;
      display: block;
    }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--mono);
      font-size: .82rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .9rem 2rem;
      border: none;
      cursor: pointer;
      transition: .2s;
    }
    .btn-primary { background: var(--accent); color: var(--bg); font-weight: 700; }
    .btn-primary:hover { box-shadow: 0 4px 24px rgba(0,229,255,.35); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    /* ── PROGRESS ── */
    .progress-bar-wrap {
      width: 100%; height: 4px;
      background: var(--border);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transition: width .4s ease;
    }
    .quiz-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem;
    }
    .q-counter {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
    }
    .timer-wrap {
      display: flex; align-items: center; gap: .5rem;
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--text);
    }
    .timer-val { color: var(--accent); font-weight: 700; }
    .timer-val.urgent { color: var(--accent2); animation: blink .5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── QUESTION ── */
    .question-text {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 2rem;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .option-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 1rem 1.2rem;
      cursor: pointer;
      text-align: left;
      font-family: var(--sans);
      font-size: .92rem;
      display: flex; align-items: center; gap: .75rem;
      transition: .2s;
      position: relative;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,.05); }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { border-color: var(--ok); background: rgba(0,229,160,.1); color: var(--ok); }
    .option-btn.wrong { border-color: var(--accent2); background: rgba(255,77,109,.1); color: var(--accent2); }
    .option-btn.highlight { border-color: var(--ok); background: rgba(0,229,160,.06); }
    .opt-letter {
      font-family: var(--mono);
      font-size: .72rem;
      width: 24px; height: 24px;
      border: 1px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      opacity: .6;
    }

    .feedback-bar {
      padding: .9rem 1.2rem;
      font-family: var(--mono);
      font-size: .8rem;
      letter-spacing: .08em;
      margin-bottom: 1.5rem;
      display: none;
    }
    .feedback-bar.show { display: block; }
    .feedback-bar.correct-fb { background: rgba(0,229,160,.1); border-left: 3px solid var(--ok); color: var(--ok); }
    .feedback-bar.wrong-fb { background: rgba(255,77,109,.1); border-left: 3px solid var(--accent2); color: var(--accent2); }

    .quiz-actions { display: flex; justify-content: flex-end; gap: .75rem; }

    /* ── SCORE ── */
    .score-screen { text-align: center; }
    .score-big {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 800;
      font-family: var(--mono);
      color: var(--accent);
      line-height: 1;
      margin: 1.5rem 0 .5rem;
    }
    .score-label { color: var(--muted); font-size: .95rem; margin-bottom: 2.5rem; }
    .score-breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .score-stat {
      background: var(--surface);
      padding: 1.2rem;
    }
    .score-stat .val {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .2rem;
    }
    .score-stat .lbl {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .4rem 1rem;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      margin-bottom: 1.5rem;
    }

    /* Review list */
    .review-list { text-align: left; margin-bottom: 2rem; }
    .review-item {
      border: 1px solid var(--border);
      padding: 1rem;
      margin-bottom: .75rem;
      border-left-width: 3px;
    }
    .review-item.correct-r { border-left-color: var(--ok); }
    .review-item.wrong-r { border-left-color: var(--accent2); }
    .review-q { font-size: .9rem; margin-bottom: .5rem; font-weight: 700; }
    .review-meta {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
    }
    .review-meta span.ok { color: var(--ok); }
    .review-meta span.err { color: var(--accent2); }

    .score-actions { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    @media (max-width: 500px) {
      .card { padding: 1.5rem; }
      .options-grid { grid-template-columns: 1fr; }
      .category-grid { grid-template-columns: 1fr; }
      .score-breakdown { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">QUIZ<span>FORGE</span></div>
  <span id="headerScore" style="font-family:var(--mono);font-size:.78rem;color:var(--muted);"></span>
</header>

<div class="card" id="appCard"></div>

<script>
  // ── DATA ──
  const QUESTIONS = {
    tech: {
      label: '💻 Technology', count: 10,
      easy: [
        { q: 'What does HTML stand for?', opts: ['Hyper Text Markup Language','High Tech Machine Language','Hyper Transfer Markup Logic','Home Tool Markup Language'], ans: 0 },
        { q: 'Which language runs in a web browser?', opts: ['Python','Java','JavaScript','C++'], ans: 2 },
        { q: 'What does CSS stand for?', opts: ['Creative Style Sheets','Cascading Style Sheets','Computer Style System','Colorful Style Syntax'], ans: 1 },
        { q: 'What is the extension of a JavaScript file?', opts: ['.py','.java','.js','.html'], ans: 2 },
        { q: 'Who created the World Wide Web?', opts: ['Bill Gates','Tim Berners-Lee','Linus Torvalds','Steve Jobs'], ans: 1 },
      ],
      hard: [
        { q: 'Which HTTP status code means "Not Found"?', opts: ['200','301','403','404'], ans: 3 },
        { q: 'What does API stand for?', opts: ['Application Programming Interface','Automated Protocol Integration','Active Page Index','Application Process Identifier'], ans: 0 },
        { q: 'Which data structure uses LIFO ordering?', opts: ['Queue','Array','Stack','Linked List'], ans: 2 },
        { q: 'What is the time complexity of Binary Search?', opts: ['O(n)','O(n²)','O(log n)','O(1)'], ans: 2 },
        { q: 'In Git, which command creates a new branch?', opts: ['git branch','git commit','git push','git merge'], ans: 0 },
      ]
    },
    science: {
      label: '🔬 Science', count: 10,
      easy: [
        { q: 'What is the chemical symbol for water?', opts: ['WA','H2O','HO2','O2H'], ans: 1 },
        { q: 'How many planets are in our Solar System?', opts: ['7','8','9','10'], ans: 1 },
        { q: 'What gas do plants absorb from the air?', opts: ['Oxygen','Nitrogen','Carbon Dioxide','Hydrogen'], ans: 2 },
        { q: 'What is the speed of light (approx)?', opts: ['300,000 km/s','150,000 km/s','3,000 km/s','3,000,000 km/s'], ans: 0 },
        { q: 'What is the powerhouse of the cell?', opts: ['Nucleus','Ribosome','Mitochondria','Golgi Body'], ans: 2 },
      ],
      hard: [
        { q: 'What is the atomic number of Carbon?', opts: ['6','8','12','14'], ans: 0 },
        { q: 'Which law states F = ma?', opts: ["Coulomb's Law","Ohm's Law","Newton's Second Law","Hooke's Law"], ans: 2 },
        { q: 'What particle has a negative charge?', opts: ['Proton','Neutron','Electron','Positron'], ans: 2 },
        { q: 'What is the SI unit of electric current?', opts: ['Volt','Watt','Ampere','Ohm'], ans: 2 },
        { q: 'DNA double helix was discovered by?', opts: ['Einstein & Bohr','Watson & Crick','Mendel & Darwin','Pasteur & Koch'], ans: 1 },
      ]
    },
    history: {
      label: '📜 History', count: 10,
      easy: [
        { q: 'In which year did World War II end?', opts: ['1942','1943','1945','1950'], ans: 2 },
        { q: 'Who was the first President of the United States?', opts: ['Abraham Lincoln','John Adams','Thomas Jefferson','George Washington'], ans: 3 },
        { q: 'The Eiffel Tower is located in which city?', opts: ['London','Paris','Rome','Berlin'], ans: 1 },
        { q: 'Who wrote the Indian national anthem?', opts: ['Mahatma Gandhi','Jawaharlal Nehru','Rabindranath Tagore','B.R. Ambedkar'], ans: 2 },
        { q: 'Which civilization built the pyramids of Giza?', opts: ['Roman','Greek','Egyptian','Mesopotamian'], ans: 2 },
      ],
      hard: [
        { q: 'The Berlin Wall fell in which year?', opts: ['1985','1987','1989','1991'], ans: 2 },
        { q: 'Who was the first woman to win a Nobel Prize?', opts: ['Rosa Parks','Marie Curie','Ada Lovelace','Florence Nightingale'], ans: 1 },
        { q: 'The Battle of Waterloo took place in which year?', opts: ['1800','1805','1810','1815'], ans: 3 },
        { q: 'Which empire was ruled by Genghis Khan?', opts: ['Ottoman','Mongol','Byzantine','Roman'], ans: 1 },
        { q: 'The Renaissance originated in which country?', opts: ['France','Spain','England','Italy'], ans: 3 },
      ]
    },
    sports: {
      label: '⚽ Sports', count: 10,
      easy: [
        { q: 'How many players are in a standard football (soccer) team?', opts: ['9','10','11','12'], ans: 2 },
        { q: 'In which sport is a "birdie" scored?', opts: ['Tennis','Cricket','Golf','Badminton'], ans: 2 },
        { q: 'How many rings are on the Olympic flag?', opts: ['4','5','6','7'], ans: 1 },
        { q: 'What sport is played at Wimbledon?', opts: ['Cricket','Badminton','Squash','Tennis'], ans: 3 },
        { q: 'How many players are on a basketball team (on court)?', opts: ['4','5','6','7'], ans: 1 },
      ],
      hard: [
        { q: 'Who holds the record for most Olympic gold medals?', opts: ['Usain Bolt','Carl Lewis','Michael Phelps','Mark Spitz'], ans: 2 },
        { q: 'In cricket, how many balls are in an over?', opts: ['4','5','6','8'], ans: 2 },
        { q: 'The FIFA World Cup is held every how many years?', opts: ['2','3','4','5'], ans: 2 },
        { q: 'Which country has won the most Cricket World Cups?', opts: ['India','West Indies','Australia','England'], ans: 2 },
        { q: 'What is the diameter of a standard basketball hoop in inches?', opts: ['14','16','18','20'], ans: 2 },
      ]
    }
  };

  const LETTERS = ['A','B','C','D'];
  const TIMER_SECONDS = 20;

  let state = {
    screen: 'home',    // home | quiz | score
    category: null,
    difficulty: 'easy',
    questions: [],
    current: 0,
    score: 0,
    selected: null,
    answered: false,
    timer: TIMER_SECONDS,
    timerInterval: null,
    history: [],
    streak: 0,
    maxStreak: 0,
    timeTaken: [],
    startTime: null,
  };

  function render() {
    const card = document.getElementById('appCard');
    const hs = document.getElementById('headerScore');
    if (state.screen === 'home') {
      hs.textContent = '';
      card.innerHTML = homeHTML();
    } else if (state.screen === 'quiz') {
      hs.textContent = `Score: ${state.score}/${state.current}`;
      card.innerHTML = quizHTML();
      attachQuizListeners();
      startTimer();
    } else {
      hs.textContent = '';
      card.innerHTML = scoreHTML();
    }
  }

  // ── HOME ──
  function homeHTML() {
    const cats = Object.entries(QUESTIONS);
    const catBtns = cats.map(([k,v]) => `
      <button class="cat-btn${state.category===k?' selected':''}" onclick="selectCat('${k}')">
        <div class="cat-icon">${v.label.split(' ')[0]}</div>
        <div class="cat-name">${v.label.slice(2)}</div>
        <div class="cat-count">${v.count} questions</div>
      </button>`).join('');
    return `
      <div class="home-title">Test Your <span>Knowledge.</span></div>
      <p class="home-sub">Pick a category, choose your difficulty, and race against the clock. 5 questions per round.</p>
      <span class="label">// Choose Category</span>
      <div class="category-grid">${catBtns}</div>
      <span class="label">// Difficulty</span>
      <div class="difficulty-row">
        <button class="diff-btn${state.difficulty==='easy'?' selected':''}" onclick="selectDiff('easy')">Easy</button>
        <button class="diff-btn${state.difficulty==='hard'?' selected':''}" onclick="selectDiff('hard')">Hard</button>
      </div>
      <button class="btn btn-primary" ${!state.category?'disabled':''} onclick="startQuiz()">Start Quiz →</button>
    `;
  }

  function selectCat(k) { state.category = k; render(); }
  function selectDiff(d) { state.difficulty = d; render(); }

  function startQuiz() {
    if (!state.category) return;
    const pool = QUESTIONS[state.category][state.difficulty];
    state.questions = shuffle([...pool]);
    state.current = 0; state.score = 0;
    state.history = []; state.streak = 0; state.maxStreak = 0;
    state.timeTaken = [];
    state.screen = 'quiz'; state.selected = null; state.answered = false;
    render();
  }

  // ── QUIZ ──
  function quizHTML() {
    const q = state.questions[state.current];
    const total = state.questions.length;
    const pct = (state.current / total) * 100;
    const optBtns = q.opts.map((o, i) => {
      let cls = 'option-btn';
      if (state.answered) {
        if (i === q.ans) cls += ' correct';
        else if (i === state.selected) cls += ' wrong';
      }
      return `<button class="${cls}" ${state.answered?'disabled':''} onclick="selectAnswer(${i})">
        <span class="opt-letter">${LETTERS[i]}</span>${o}
      </button>`;
    }).join('');

    let fbCls = '', fbTxt = '';
    if (state.answered) {
      if (state.selected === q.ans) {
        fbCls = 'feedback-bar correct-fb show';
        fbTxt = `✓ Correct! ${state.streak>1?'🔥 '+state.streak+' streak!':''}`;
      } else {
        fbCls = 'feedback-bar wrong-fb show';
        fbTxt = `✗ Wrong. Correct answer: ${LETTERS[q.ans]}. ${q.opts[q.ans]}`;
      }
    }

    return `
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="quiz-meta">
        <span class="q-counter">Question ${state.current+1} of ${total}</span>
        <div class="timer-wrap">⏱ <span class="timer-val${state.timer<=5?' urgent':''}" id="timerVal">${state.timer}s</span></div>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options-grid">${optBtns}</div>
      <div class="${fbCls}">${fbTxt}</div>
      <div class="quiz-actions">
        ${state.answered
          ? `<button class="btn btn-primary" onclick="nextQuestion()">${state.current+1<total?'Next Question →':'See Results →'}</button>`
          : `<button class="btn btn-ghost" onclick="skipQuestion()">Skip</button>`
        }
      </div>
    `;
  }

  function attachQuizListeners() {} // click handlers are inline

  function startTimer() {
    clearInterval(state.timerInterval);
    state.startTime = Date.now();
    state.timerInterval = setInterval(() => {
      if (state.answered) return;
      state.timer--;
      const el = document.getElementById('timerVal');
      if (el) {
        el.textContent = state.timer + 's';
        if (state.timer <= 5) el.classList.add('urgent');
      }
      if (state.timer <= 0) {
        clearInterval(state.timerInterval);
        autoExpire();
      }
    }, 1000);
  }

  function autoExpire() {
    if (state.answered) return;
    state.answered = true;
    state.selected = -1;
    state.streak = 0;
    const q = state.questions[state.current];
    state.history.push({ q: q.q, your: null, correct: q.ans, opts: q.opts, result: false });
    state.timeTaken.push(TIMER_SECONDS);
    render();
  }

  function selectAnswer(i) {
    if (state.answered) return;
    clearInterval(state.timerInterval);
    const elapsed = Math.round((Date.now() - state.startTime) / 1000);
    state.timeTaken.push(elapsed);
    const q = state.questions[state.current];
    state.selected = i;
    state.answered = true;
    if (i === q.ans) {
      state.score++;
      state.streak++;
      state.maxStreak = Math.max(state.streak, state.maxStreak);
    } else {
      state.streak = 0;
    }
    state.history.push({ q: q.q, your: i, correct: q.ans, opts: q.opts, result: i===q.ans });
    render();
  }

  function skipQuestion() {
    clearInterval(state.timerInterval);
    const q = state.questions[state.current];
    state.answered = true;
    state.selected = -1;
    state.streak = 0;
    state.history.push({ q: q.q, your: null, correct: q.ans, opts: q.opts, result: false });
    state.timeTaken.push(TIMER_SECONDS);
    render();
  }

  function nextQuestion() {
    clearInterval(state.timerInterval);
    state.current++;
    if (state.current >= state.questions.length) {
      state.screen = 'score';
    } else {
      state.answered = false;
      state.selected = null;
      state.timer = TIMER_SECONDS;
    }
    render();
  }

  // ── SCORE ──
  function scoreHTML() {
    const total = state.questions.length;
    const pct = Math.round((state.score / total) * 100);
    const avgTime = state.timeTaken.length
      ? Math.round(state.timeTaken.reduce((a,b)=>a+b,0)/state.timeTaken.length)
      : 0;

    let badge = '', badgeColor = '';
    if (pct === 100) { badge = '🏆 Perfect Score!'; badgeColor = 'var(--ok)'; }
    else if (pct >= 80) { badge = '⭐ Excellent!'; badgeColor = 'var(--accent)'; }
    else if (pct >= 60) { badge = '👍 Good Job!'; badgeColor = 'var(--accent3)'; }
    else if (pct >= 40) { badge = '📖 Keep Practicing!'; badgeColor = 'var(--muted)'; }
    else { badge = '💪 Try Again!'; badgeColor = 'var(--accent2)'; }

    const reviewItems = state.history.map(h => {
      const cls = h.result ? 'correct-r' : 'wrong-r';
      const yourAns = h.your !== null ? LETTERS[h.your]+'. '+h.opts[h.your] : 'Skipped / Timed Out';
      return `<div class="review-item ${cls}">
        <div class="review-q">${h.q}</div>
        <div class="review-meta">
          ${h.result
            ? `<span class="ok">✓ Correct: ${LETTERS[h.correct]}. ${h.opts[h.correct]}</span>`
            : `<span class="err">✗ Your answer: ${yourAns}</span> &nbsp;·&nbsp; Correct: ${LETTERS[h.correct]}. ${h.opts[h.correct]}`
          }
        </div>
      </div>`;
    }).join('');

    return `
      <div class="score-screen">
        <div style="font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;">// Round Complete</div>
        <div class="score-big">${state.score}/${total}</div>
        <div class="score-label">${pct}% accuracy · ${QUESTIONS[state.category].label.slice(2)} · ${state.difficulty}</div>
        <div class="badge" style="border-color:${badgeColor};color:${badgeColor};">${badge}</div>
        <div class="score-breakdown">
          <div class="score-stat">
            <div class="val" style="color:var(--ok)">${state.score}</div>
            <div class="lbl">Correct</div>
          </div>
          <div class="score-stat">
            <div class="val" style="color:var(--accent2)">${total-state.score}</div>
            <div class="lbl">Wrong</div>
          </div>
          <div class="score-stat">
            <div class="val" style="color:var(--accent3)">${state.maxStreak}</div>
            <div class="lbl">Best Streak</div>
          </div>
        </div>
        <div class="review-list">${reviewItems}</div>
        <div class="score-actions">
          <button class="btn btn-ghost" onclick="goHome()">← Change Category</button>
          <button class="btn btn-primary" onclick="playAgain()">Play Again →</button>
        </div>
      </div>
    `;
  }

  function goHome() {
    clearInterval(state.timerInterval);
    state.screen = 'home'; state.category = null; state.difficulty = 'easy';
    render();
  }
  function playAgain() {
    clearInterval(state.timerInterval);
    state.timer = TIMER_SECONDS;
    startQuiz();
  }

  // ── UTILS ──
  function shuffle(arr) {
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  // ── INIT ──
  render();
</script>
</body>
</html>
